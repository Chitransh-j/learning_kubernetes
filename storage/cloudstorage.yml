apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-storage
provisioner: disk.csi.azure.com   # Example: Azure Disk CSI driver
parameters:
  skuName: Standard_LRS
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
# This remains same. The logic is decoupled at the pv and storageclass level.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-pvc
spec:
  storageClassName: standard-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi


--- 
# This remains same. The logic is decoupled at the pv and storageclass level.
apiVersion: v1
kind: Pod
metadata:
  name: nginx-with-storage
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: app-storage
          mountPath: /data
  volumes:
    - name: app-storage
      persistentVolumeClaim:
        claimName: app-pvc